services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/car-calling
      - JWT_SECRET=your-super-secret-jwt-key
      - JWT_REFRESH_SECRET=your-refresh-token-secret
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # This tells the frontend container how to reach the backend container
      - VITE_API_PROXY_TARGET=http://backend:5001
    depends_on:
      - backend

volumes:
  mongodb_data:
